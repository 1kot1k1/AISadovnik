<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Садовник — Диагностика растений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1464226184884-fa280b87c399");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        /* --- ИНДИКАТОР ЗАГРУЗКИ --- */
        #loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid rgba(255,255,255,0.1);
            border-top: 6px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        .container {
            width: 100%;
            max-width: 850px;
            padding: 60px 40px;
            text-align: center;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            margin-bottom: 50px;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* --- ФОРМА И КНОПКИ --- */
        .upload-section {
            margin-bottom: 30px;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 18px 45px;
            border-radius: 18px;
            background: #4CAF50;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.3);
        }

        .custom-file-upload:hover {
            background: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        input[type=file] { display: none; }

        #file-name {
            margin: 25px 0 35px 0;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            font-style: italic;
        }

        .predict-btn {
            padding: 18px 50px;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: #2196F3;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .predict-btn:hover {
            background: #1e88e5;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.4);
        }

        /* --- БЛОК РЕЗУЛЬТАТОВ --- */
        .result {
            margin-top: 60px;
            padding-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .result img {
            max-width: 320px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.1);
        }

        .info-box {
            margin: 35px 0;
            padding: 25px;
            border-radius: 20px;
            background: rgba(76, 175, 80, 0.15);
            border-left: 6px solid #4CAF50;
            text-align: left;
            line-height: 1.6;
        }

        .info-box h3 {
            margin-bottom: 12px;
            color: #a5d6a7;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }

        th, td {
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background: rgba(255,255,255,0.1);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <h2 style="color: white; font-weight: 300;">Искусственный интеллект анализирует фото...</h2>
</div>

<div class="container">
    <h1>🌿 Распознавание болезней</h1>
    
    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
        
        <div class="upload-section">
            <label for="file-upload" class="custom-file-upload">
                📁 Выбрать изображение
            </label>
            <input id="file-upload" type="file" name="file" required onchange="updateFileName(this)">
        </div>

        <p id="file-name">Файл еще не выбран</p>

        <button class="predict-btn" type="submit">
            🔍 Сравнить модели
        </button>

    </form>

    {% if image %}
    <div class="result">
        <img src="/{{ image }}" alt="Загруженное фото">
        
        <h2 style="margin-bottom: 10px;">Обнаружено:</h2>
        <h1 style="color: #81C784; margin-bottom: 30px;">{{ winner.class }}</h1>
        
        <div class="info-box">
            <h3>📝 Рекомендация:</h3>
            <p>{{ description }}</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Модель нейросети</th>
                    <th>Уверенность</th>
                </tr>
            </thead>
            <tbody>
                {% for r in results %}
                <tr>
                    <td>{{ r.model }}</td>
                    <td><b>{{ r.confidence }}%</b></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endif %}
</div>

<script>
    function updateFileName(input) {
        let fileName = input.files.length > 0 ? input.files[0].name : "Файл еще не выбран";
        document.getElementById("file-name").innerText = fileName;
    }

    function showLoader() {
        document.getElementById("loader").style.display = "flex";
    }
</script>

</body>
</html>
